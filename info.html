<body>
    <div class="h"></div>
    <div class="info-main" style="width:50vw;">
        <canvas id="speedChart" style="width: 50vw; height: 35vh; margin: 70px 0 0 0;border-radius: 10px;margin-top: 50px;box-shadow: 0 0 10px rgb(0 0 0 / 24%);"></canvas>
        <canvas id="speedChart2" style="width: 50vw; height: 35vh; margin: 70px 0 0 0;border-radius: 10px;margin-top: 50px;box-shadow: 0 0 10px rgb(0 0 0 / 24%);"></canvas>
        <canvas id="speedChart3" style="width: 50vw; height: 35vh; margin: 70px 0 0 0;border-radius: 10px;margin-top: 50px;box-shadow: 0 0 10px rgb(0 0 0 / 24%);"></canvas>
        <div class="info-main">
            <section class="grid-1">
                <div class="grid-item">
                    <span class="grid-title">Спрос вырастет на:</span>
                    <img src="arrow.svg" class="fas grid-icon" aria-hidden="true">
                    <span class="grid-desc">0%</span>
                </div>
                <div class="grid-item">
                    <span class="grid-title">Надо закупить :</span>
                    <img src="supply.svg" class="fas grid-icon" aria-hidden="true">
                    <span class="grid-desc">0 шт.</span>
                </div>
                <div class="grid-item">
                    <span class="grid-title">Динамика спроса:</span>
                    <img src="increase.svg" class="fas grid-icon" aria-hidden="true">
                    <span class="grid-desc">0%</span>
                </div>
                <div class="grid-item">
                    <span class="grid-title">Рентабельность:</span>
                    <img src="profits.svg" class="fas grid-icon" aria-hidden="true">
                    <span class="grid-desc">0%</span>
                </div>
            </section>
        </div>
    </div>
