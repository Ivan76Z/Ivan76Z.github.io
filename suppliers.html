	<div class="main">
<div class="row">
    <div class="col-sm-12">
        <table id="country-table" class="table table-curved dataTable no-footer" role="grid" aria-describedby="country-table_info">
            <thead>
                <tr role="row">
                    <th rowspan="1" colspan="1" aria-label="Rank" style="width: 38px;">Номер</th>
                    <th  tabindex="0" aria-controls="country-table" rowspan="1" colspan="1" aria-label="Country: activate to sort column ascending">Название</th>
                    <th rowspan="1" colspan="1" aria-label="Cases: activate to sort column ascending" style="width: 62px;">Цена</th>
                    <th rowspan="1" colspan="1" aria-label="Deaths: activate to sort column ascending" style="width: 48px;">Расстояние</th>
                    

                </tr>
            </thead>
            <tbody id="tbody">
                
            </tbody>
        </table>
    </div>
</div>
</td>
<script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$( document ).ready(function() {
	var template,data;
	$.getJSON('data.json', function(data) {
		//let data = JSON.stringify(obj);
    for(let i =1;i<=data.length+1;i++){
    	$('#tbody').append(`
    		
                <tr role="row" class="odd" data-id="${data[i-1]["id"]}">
                    <td>${i}</td>
                    <td style=" left: 58px;">
                        <div>${data[i-1]["name"]}</div>
                    </td>
                    <td>${data[i-1]["price"]}</td>
                    <td>${data[i-1]["distance"]}</td>
                </tr>
    		`);
    }
});


});
