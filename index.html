<!DOCTYPE html>
<head>
 <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
<title>Перефразировщик</title>
<link rel="stylesheet" type="text/css" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="section">
    <div class="title-block">

        <div class="title-first">REPHRASER.XYZ</div>
        <div class="title-second">Умный перефразировщик текста</div>
    </div>
    <div class="main">
        <div class="line-v"></div>
        <textarea class="text-block">Товарищи! сложившаяся структура организации требуют от нас анализа позиций, занимаемых участниками в отношении поставленных задач.</textarea>
        <p class="text-block"></p>
        <div class="line-g"></div>
        <div class="after-limit"><span id="limit" class="color-limit">500</span>/1000 слов</div>
        <div class="before-percent">Оригинальность: <span id="percent" class="color-limit">0</span>%</div>
    </div>
    <button class="rephrase">Перефразировать</button>
    </div>
    <script src="jsdiff.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.0.min.js"></script>
    <script src="main.js"></script>
</body>
