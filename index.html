<html>

<head>
    <meta charset="utf-8">
    <script src="https://kit.fontawesome.com/5f8ac2259b.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" type="text/css" href="gg.css">
</head>

<body>
    <div class="main">
        <div class="search_div">
            <input class="search_i" placeholder="Поиск в таблице">
            <button class="search_b">Поиск</button>
        </div>
        <div class="row">
            <div class="col-sm-12">
                <table id="country-table" class="table table-curved dataTable no-footer" role="grid" aria-describedby="country-table_info">
                    <thead>
                        <tr role="row">
                            <th rowspan="1" colspan="1" aria-label="Rank" style="width: 38px;">Номер</th>
                            <th tabindex="0" aria-controls="country-table" rowspan="1" colspan="1" aria-label="Country: activate to sort column ascending">Название</th>
                            <th rowspan="1" colspan="1" aria-label="Cases: activate to sort column ascending" style="width: 62px;">Количество</th>
                            <th rowspan="1" colspan="1" aria-label="Deaths: activate to sort column ascending" style="width: 48px;">Цена</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                    </tbody>
                </table>
            </div>
            <div class="info-main">
                <section class="grid-1">
                    <div class="grid-item">
                        <span class="grid-title">Общая цена товаров: </span>
                        <img src="money.svg" class="fas grid-icon" aria-hidden="true">
                        <span class="grid-desc" id="total_price">0</span>
                    </div>
                    <div class="grid-item">
                        <span class="grid-title">Всего товаров:</span>
                        <img src="warehouse.svg" class="fas grid-icon" aria-hidden="true">
                        <span class="grid-desc" id="total_items">0</span>
                    </div>
                    <div class="grid-item">
                        <span class="grid-title">Продаж в этом месяце:</span>
                        <img src="business-and-finance.svg" class="fas grid-icon" aria-hidden="true">
                        <span class="grid-desc" id="orders">79</span>
                    </div>
                    <div class="grid-item">
                        <span class="grid-title">Прибыль:</span>
                        <img src="financial-profit.svg" class="fas grid-icon" aria-hidden="true">
                        <span class="grid-desc" id="max_price">0</span>
                    </div>
                </section>
            </div>
        </div>
        </td>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <!-- The core Firebase JS SDK is always required and must be listed first -->
<script src="https://www.gstatic.com/firebasejs/8.6.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.5.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.5.0/firebase-database.js"></script>

<!-- TODO: Add SDKs for Firebase products that you want to use
     https://firebase.google.com/docs/web/setup#available-libraries -->
        <script src="login.js"></script>
        <script src="script.js"></script>
        <script>
        $(document).ready(function() {
            $(document).on('click', '.odd', function() {
                var win = window.open("info.html?" + $(this).attr("data-id"));
                win.focus();
            });

        });
        </script>
</body>

</html>
